name: Peerpesa Pay

on:
  push:
    branches:
      - main
      - dev

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/peerpesa-pay:${{ github.ref_name == 'main' && 'latest' || 'dev' }}

      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy to DEV
        if: github.ref_name == 'dev'
        env:
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          APP_NAME: peerpesa-pay-dev
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/peerpesa-pay:dev
          ENV_FILE_PATH: ${{ secrets.DEV_ENV_APP_PATH }}
          APP_PORT: ${{ secrets.DEV_APP_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $REMOTE_PORT $REMOTE_USER@$REMOTE_HOST << EOF
            echo '=== Pulling latest DEV image ==='
            docker pull $IMAGE

            echo '=== Stopping existing DEV container ==='
            docker stop $APP_NAME 2>/dev/null || true
            docker rm $APP_NAME 2>/dev/null || true

            echo '=== Starting DEV container ==='
            docker run -d \
              --name $APP_NAME \
              --restart unless-stopped \
              --env-file $ENV_FILE_PATH \
              -p $APP_PORT:3000 \
              $IMAGE

            echo '=== DEV deployment complete ==='
            docker ps | grep $APP_NAME
          EOF

      - name: Deploy to Production
        if: github.ref_name == 'main'
        env:
          REMOTE_HOST: ${{ secrets.SERVER_IP }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          APP_NAME: peerpesa-pay
          IMAGE: ${{ secrets.DOCKER_USERNAME }}/peerpesa-pay:latest
          ENV_FILE_PATH: ${{ secrets.ENV_APP_PATH }}
          APP_PORT: ${{ secrets.APP_PORT }}
        run: |
          ssh -i ~/.ssh/deploy_key -p $REMOTE_PORT $REMOTE_USER@$REMOTE_HOST << EOF
            echo '=== Pulling latest Production image ==='
            docker pull $IMAGE

            echo '=== Stopping existing Production container ==='
            docker stop $APP_NAME 2>/dev/null || true
            docker rm $APP_NAME 2>/dev/null || true

            echo '=== Starting Production container ==='
            docker run -d \
              --name $APP_NAME \
              --restart unless-stopped \
              --env-file $ENV_FILE_PATH \
              -p $APP_PORT:3000 \
              $IMAGE

            echo '=== Production deployment complete ==='
            docker ps | grep $APP_NAME
          EOF
